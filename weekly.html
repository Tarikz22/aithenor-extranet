<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aithenor — Weekly Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy: #0F1F3D;
  --navy-mid: #1B3A6B;
  --navy-light: #243F72;
  --gold: #C9A84C;
  --gold-light: #E8C96A;
  --gold-pale: #FBF6EA;
  --cream: #FAFAF7;
  --white: #FFFFFF;
  --red: #C0392B;
  --red-light: #FDECEA;
  --orange: #D35400;
  --orange-light: #FEF0E7;
  --amber: #B8860B;
  --amber-light: #FEF9E7;
  --green: #1A6B3C;
  --green-light: #E8F5ED;
  --gray-100: #F5F5F3;
  --gray-200: #E8E8E5;
  --gray-300: #D8D8D3;
  --gray-400: #9A9A95;
  --gray-600: #6B6B67;
  --gray-900: #1A1A18;
  --color-border-tertiary: var(--gray-200);
  --color-background-primary: var(--white);
  --color-text-primary: var(--gray-900);
  --color-text-secondary: var(--gray-600);
  --color-text-tertiary: var(--gray-400);
  --gray-50: #FAFAF9;
  --gray-500: #73736E;
  --gray-700: #454542;
  --gray-800: #2E2E2B;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--gray-900);
  min-height: 100vh;
}

.topbar {
  background: var(--white);
  border-bottom: 1px solid var(--gray-200);
  padding: 0 32px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-left { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }

.topbar-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 22px;
  font-weight: 500;
  color: var(--navy);
  letter-spacing: 0.3px;
}

.topbar-brand {
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-text-primary);
}

.topbar-meta {
  font-size: 12px;
  color: var(--color-text-secondary);
  margin-top: 2px;
}

.topbar-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

.period-select {
  background: var(--navy);
  color: var(--gold);
  font-size: 11px;
  font-weight: 500;
  padding: 5px 12px;
  border-radius: 4px;
  letter-spacing: 1px;
  text-transform: uppercase;
  border: none;
  font-family: 'DM Sans', sans-serif;
  cursor: pointer;
  outline: none;
  appearance: none;
}

.refresh-btn {
  background: transparent;
  border: 1px solid var(--gray-200);
  color: var(--gray-600);
  font-size: 12px;
  padding: 6px 14px;
  border-radius: 4px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}

.refresh-btn:hover { border-color: var(--navy); color: var(--navy); }

.upload-btn {
  background: var(--gold);
  color: var(--navy);
  font-size: 12px;
  font-weight: 600;
  padding: 7px 18px;
  border-radius: 4px;
  border: none;
  cursor: pointer;
  letter-spacing: 0.5px;
  font-family: 'DM Sans', sans-serif;
}

.upload-btn:hover { background: var(--gold-light); }

.dash-link {
  font-size: 12px;
  color: var(--navy-mid);
  text-decoration: none;
  padding: 6px 10px;
  border-radius: 4px;
  border: 1px solid var(--gray-200);
}

.dash-link:hover { border-color: var(--navy); color: var(--navy); }

.content { padding: 28px 32px 48px; max-width: 1200px; margin: 0 auto; }

.loading-state, .error-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--gray-600);
}

.loading-spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--gray-200);
  border-top-color: var(--navy);
  border-radius: 50%;
  margin: 0 auto 14px;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-state { color: var(--red); }

/* KPI strip */
#movement-strip {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: 8px;
  overflow: hidden;
  background: var(--color-background-primary);
  margin-bottom: 20px;
}

.kpi-cell {
  padding: 14px 20px;
  border-right: 0.5px solid var(--color-border-tertiary);
}
.kpi-cell:last-child { border-right: none; }
.kpi-cell .kpi-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--color-text-tertiary); margin-bottom: 4px;
}
.kpi-cell .kpi-value {
  font-size: 22px; font-weight: 500; color: var(--color-text-primary);
}
.kpi-cell .kpi-value.kpi-neg { color: #D85A30; }
.kpi-cell .kpi-value.kpi-pos { color: #3B6D11; }
.kpi-cell .kpi-value.kpi-warn { color: #BA7517; }
.kpi-cell .kpi-sub {
  font-size: 11px; color: var(--color-text-tertiary); margin-top: 4px;
}

.section-title {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--gray-400);
  font-weight: 600;
  margin: 24px 0 10px;
}

/* nc-card (subset from index.html) */
.nc-card {
  background: var(--white);
  border: 0.5px solid var(--gray-200);
  border-radius: 8px;
  overflow: hidden;
  margin-bottom: 12px;
}
.nc-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 14px 16px 12px;
  border-bottom: 0.5px solid var(--gray-100);
  gap: 12px;
}
.nc-title {
  font-size: 16px;
  font-weight: 500;
  color: var(--navy);
  line-height: 1.35;
}
.nc-body { padding: 0 16px 14px; display: flex; flex-direction: column; gap: 0; }
.nc-section { padding: 10px 0; border-bottom: 0.5px solid var(--gray-100); }
.nc-section:last-child { border-bottom: none; }
.nc-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.09em;
  color: var(--gray-400);
  margin-bottom: 5px;
  font-weight: 500;
}
.nc-text {
  font-size: 13px;
  color: var(--gray-800);
  line-height: 1.65;
}
.nc-text-bold {
  font-size: 13px;
  font-weight: 500;
  color: var(--navy);
  line-height: 1.65;
}

.wk-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
.wk-table th {
  text-align: left;
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--gray-400);
  font-weight: 600;
  padding: 8px 10px 8px 0;
  border-bottom: 1px solid var(--gray-200);
}
.wk-table td {
  padding: 10px 10px 10px 0;
  border-bottom: 1px solid var(--gray-100);
  vertical-align: top;
  color: var(--gray-800);
}
.wk-table tr:last-child td { border-bottom: none; }

.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  text-transform: uppercase;
  letter-spacing: 0.04em;
}
.badge-closing { background: var(--green-light); color: var(--green); }
.badge-widening { background: var(--red-light); color: var(--red); }
.badge-stable { background: var(--gray-100); color: var(--gray-600); }

.still-open {
  font-size: 10px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: var(--orange);
  border: 1px solid var(--orange-light);
  background: var(--orange-light);
  padding: 2px 8px;
  border-radius: 4px;
}

.mov-arrow { font-weight: 700; margin-right: 4px; }
.mov-up { color: var(--green); }
.mov-down { color: var(--red); }
.mov-flat { color: var(--gray-400); }

.sub-h {
  font-size: 12px;
  font-weight: 600;
  color: var(--navy);
  margin: 12px 0 8px;
}
</style>
</head>

      <div class="topbar-brand">Aithenor</div>

<script>

const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZwbmx6cGZreWdzeXZrZXR0anVqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMDM1NzIsImV4cCI6MjA4ODg3OTU3Mn0.VsfqeclitY91kpn-qS2NBg94BJA99YMgtrmlC9Wz8ns';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// FIX: HOTEL_CODE was hardcoded to 'AUREM-PAR', locking this page to one
// property for all users. Now sourced from localStorage like every other page
// in the app, set at login from session.user.user_metadata.hotel.
const HOTEL_CODE = localStorage.getItem('hotelCode') || '';

let snapshotRows = [];

function escHtml(str) {
  if (str === null || str === undefined) return '';
  return String(str)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function unwrapEngineJson(raw) {
  let j = typeof raw === 'string' ? (() => { try { return JSON.parse(raw); } catch { return {}; } })() : (raw || {});
  const inner = j?.engine;
  if (inner != null && typeof inner === 'object' && !Array.isArray(inner)) j = inner;
  return j;
}

function uniqueBy(arr, keyFn) {
  const seen = new Set();
  const out = [];
  for (const item of arr || []) {
    const k = keyFn(item);
    if (seen.has(k)) continue;
    seen.add(k);
    out.push(item);
  }
  return out;
}

function num(v) {
  const n = Number(v);
  return Number.isFinite(n) ? n : null;
}

/** Same merge as index KPI strip: headline_numbers then diagnosis fallbacks. */
function buildKpiCells(engineJson) {
  const cv = engineJson?.commercial_verdict;
  const headlineNumbers = Array.isArray(cv?.headline_numbers) ? cv.headline_numbers : [];
  const dm = engineJson?.diagnosis?.metrics || {};
  const fallbacks = [
    { value: dm.avgMPI, label: 'MPI', direction: 'neutral' },
    { value: dm.avgARI, label: 'ARI', direction: 'neutral' },
    { value: dm.avgRGI, label: 'RGI', direction: 'neutral' },
    { value: null, label: '—', direction: 'neutral' }
  ].filter(f => f.value != null);
  const kpiCells = [...headlineNumbers];
  for (const fb of fallbacks) {
    if (kpiCells.length >= 4) break;
    const alreadyPresent = kpiCells.some(k =>
      String(k.label || '').toLowerCase().includes(String(fb.label || '').toLowerCase())
    );
    if (!alreadyPresent) kpiCells.push(fb);
  }
  while (kpiCells.length < 4) kpiCells.push({ value: null, label: '—', direction: 'neutral' });
  return kpiCells.slice(0, 4);
}

function extractMpiAriRgi(engineJson) {
  const cells = buildKpiCells(engineJson);
  const findBy = sub => cells.find(c => String(c.label || '').toLowerCase().includes(sub));
  return {
    mpi: num(findBy('mpi')?.value),
    ari: num(findBy('ari')?.value),
    rgi: num(findBy('rgi')?.value)
  };
}

function totalRnOtbTy(engineJson) {
  return num(engineJson?.segment_overview?.total_rn_ty);
}

function isStableRelative(a, b) {
  if (a == null || b == null) return true;
  if (a === 0 && b === 0) return true;
  const base = Math.abs(a) < 1e-6 ? Math.abs(b) : Math.abs(a);
  const pct = (Math.abs(b - a) / base) * 100;
  return pct < 0.5;
}

/** Higher MPI/ARI/RGI = improving for hotel. */
function movementArrowDelta(a, b, higherIsBetter) {
  if (a == null || b == null) {
    return { arrow: '→', cls: 'mov-flat', deltaStr: '—', stable: true };
  }
  const d = b - a;
  if (isStableRelative(a, b)) {
    return { arrow: '→', cls: 'mov-flat', deltaStr: formatDelta(a, b, d, false), stable: true };
  }
  const improved = higherIsBetter ? d > 0 : d < 0;
  const arrow = improved ? '▲' : '▼';
  const cls = improved ? 'mov-up' : 'mov-down';
  return { arrow, cls, deltaStr: formatDelta(a, b, d, true), stable: false };
}

function formatDelta(a, b, d, signed) {
  const ad = Math.abs(d);
  const fmt = ad % 1 === 0 ? String(Math.round(ad)) : ad.toFixed(1);
  if (!signed) return fmt;
  return (d >= 0 ? '+' : '−') + fmt;
}

function formatKpiDisplay(val) {
  if (val == null) return '—';
  if (Math.abs(val) >= 1000) return Math.round(val).toLocaleString('en-GB');
  return val % 1 === 0 ? String(Math.round(val)) : val.toFixed(1);
}

function classifyForwardWindow(issue) {
  const fk = String(issue.finding_key || '').toLowerCase();
  const wl = String(issue.window_label || '').toLowerCase();
  const fw = String(issue.forward_window || '').toLowerCase();
  const blob = `${fk} ${wl} ${fw}`;
  if (/window[_\s-]?1\b|\b1\s*[–-]\s*30\b|days\s*1\s*[–-]\s*30|next\s*30/i.test(blob)) return 1;
  if (/window[_\s-]?2\b|\b31\s*[–-]\s*60\b|days\s*31\s*[–-]\s*60/i.test(blob)) return 2;
  if (/window[_\s-]?3\b|\b61\s*[–-]\s*90\b|days\s*61\s*[–-]\s*90/i.test(blob)) return 3;
  return null;
}

function paceGapRowFromIssue(issue) {
  const pd = issue?.pace_data;
  if (!pd || typeof pd !== 'object') return null;
  const otbTy = num(pd.otb_rn_ty ?? pd.otb_rn);
  const ref = num(pd.reference_rn ?? pd.ly_rn ?? pd.ref_rn);
  let gapRn = null;
  if (ref != null && otbTy != null) gapRn = Math.round(ref - otbTy);
  const gapPct = num(issue.pace_gap_pct != null ? issue.pace_gap_pct : pd.pace_gap_pct);
  return { gapRn, gapPct, otbTy, ref };
}

function forwardByThreeWindows(engineJson) {
  const issues = Array.isArray(engineJson?.forward_issues) ? engineJson.forward_issues : [];
  const buckets = { 1: [], 2: [], 3: [] };
  for (const iss of issues) {
    const w = classifyForwardWindow(iss);
    if (w && buckets[w]) buckets[w].push(iss);
  }
  const out = [];
  for (let w = 1; w <= 3; w++) {
    let list = buckets[w];
    if (!list.length) {
      const unassigned = issues.filter(i => !classifyForwardWindow(i) && i.pace_data);
      if (unassigned.length === 3) {
        const sorted = [...unassigned].sort((a, b) =>
          String(a.pace_data?.window_start_ymd || '').localeCompare(String(b.pace_data?.window_start_ymd || ''))
        );
        const pick = sorted[w - 1];
        if (pick) list = [pick];
      }
    }
    const issue = list[0] || null;
    const label = w === 1 ? '1–30 days' : w === 2 ? '31–60 days' : '61–90 days';
    out.push({ window: w, label, issue, metrics: issue ? paceGapRowFromIssue(issue) : null });
  }
  return out;
}

function paceStatusBadge(gapB, gapA, pctB, pctA) {
  const useRn = gapB != null && gapA != null;
  let d;
  if (useRn) d = gapB - gapA;
  else if (pctB != null && pctA != null) d = pctB - pctA;
  else return { text: 'Stable', cls: 'badge-stable' };
  if (Math.abs(d) < 0.51) return { text: 'Stable', cls: 'badge-stable' };
  /** Positive gapRn = shortfall; decrease = closing */
  if (useRn) {
    if (d < 0) return { text: 'Closing', cls: 'badge-closing' };
    if (d > 0) return { text: 'Widening', cls: 'badge-widening' };
  } else {
    if (d > 0) return { text: 'Closing', cls: 'badge-closing' };
    if (d < 0) return { text: 'Widening', cls: 'badge-widening' };
  }
  return { text: 'Stable', cls: 'badge-stable' };
}

function segmentKey(card) {
  // WHY: Old snapshots stored "Discount / OTA" before the naming fix.
  const raw = String(card.display_name || card.segment || card.primary_segment || '').trim() || '—';
  return raw.replace(/Discount\s*\/\s*OTA/gi, 'Discount');
}

function segmentStatus(card) {
  return String(card.scenario_type || card.scenario || card.issue_family || '').trim() || '';
}

function scenarioRank(s) {
  const u = s.toUpperCase();
  if (/S7|CRITICAL|DANGER/.test(u)) return 6;
  if (/S6|S5/.test(u)) return 5;
  if (/S4/.test(u)) return 4;
  if (/PACE|TIMING|MISREAD/.test(u)) return 3;
  if (/S[12]|NOISE/.test(u)) return 2;
  if (/OPPORTUNITY|OPP/i.test(u)) return 1;
  return u ? 2 : 0;
}

function segmentChange(aStatus, bStatus) {
  const A = (aStatus || '').trim();
  const B = (bStatus || '').trim();
  const aHas = !!A;
  const bHas = !!B;
  if (!aHas && bHas) return 'New issue';
  if (aHas && !bHas) return 'Resolved';
  if (A === B) return 'Unchanged';
  if (scenarioRank(B) > scenarioRank(A)) return 'Escalated';
  if (scenarioRank(B) < scenarioRank(A)) return 'Resolved';
  return 'Escalated';
}

// WHY: S4, S5, S7 etc are internal codes — meaningless to a GM.
// Map to readable commercial labels for the weekly comparison table.
const SCENARIO_LABELS = {
  'S1': 'Stable — no signal',
  'S2': 'Minor noise',
  'S3': 'Rate opportunity',
  'S4': 'Volume behind, rate holding',
  'S5': 'Both volume and rate declining',
  'S6': 'Pace timing misread',
  'S7': 'Volume growing, rate diluting',
  'S8': 'Full compression opportunity',
  'opportunity': 'Opportunity',
  'noise': 'Stable',
  'pace_timing_misread': 'Pace timing misread'
};
function readableScenarioLabel(code) {
  if (!code) return '—';
  const upper = code.toUpperCase();
  for (const [k, v] of Object.entries(SCENARIO_LABELS)) {
    if (upper === k.toUpperCase()) return v;
  }
  return code; // fallback: show raw value if not mapped
}

function allAccountsAtRisk(engineJson) {
  const issues = Array.isArray(engineJson?.corporate_account_pace_issues)
    ? engineJson.corporate_account_pace_issues : [];
  const accounts = [];
  for (const c of issues) {
    if (Array.isArray(c.accounts_at_risk)) accounts.push(...c.accounts_at_risk);
  }
  return accounts;
}

function accountCompanyKey(a) {
  return String(a.company_name || a.account_name || a.name || '').trim().toLowerCase();
}

function normaliseForMatchingKey(fk) {
  // WHY: Strip trailing date suffix (YYYY-MM-DD or YYYYMMDD) and
  // snapshot week key (YYYY-Www) from finding_key so causal chain
  // and synthesis cards match across different snapshot dates.
  return String(fk || '')
    .replace(/_\d{4}-\d{2}-\d{2}$/, '')   // strip _YYYY-MM-DD
    .replace(/_\d{8}$/, '')               // strip _YYYYMMDD
    .replace(/_\d{4}-W\d{2}$/, '')        // strip _YYYY-Www
    .trim();
}

function collectSegmentDecisions(ej) {
  const cards = Array.isArray(ej?.segment_issue_cards) ? ej.segment_issue_cards : [];
  return cards.map(c => ({
    finding_key: normaliseForMatchingKey(c.finding_key),
    line: String(c.enforced_decision_line || c.decision || '').trim()
  })).filter(x => x.finding_key && x.line);
}

function collectCausalDecision(ej) {
  const cc = ej?.cross_segment_synthesis?.causal_chain_card;
  if (!cc || typeof cc !== 'object') return null;
  const line = String(cc.enforced_decision_line || cc.decision || '').trim();
  const fk = normaliseForMatchingKey(cc.finding_key || 'causal_chain_card');
  if (!line) return null;
  return { finding_key: fk, line };
}

function showError(msg) {
  const el = document.getElementById('error-state');
  document.getElementById('error-msg').textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error-state').style.display = 'none';
}

function setLoading(on) {
  document.getElementById('loading-state').style.display = on ? 'block' : 'none';
}

function formatSnapLabel(row) {
  const d = row.snapshot_date || '';
  const p = row.period_label ? ` · ${row.period_label}` : '';
  return `${d}${p}`;
}

async function loadSnapshots() {
  setLoading(true);
  hideError();
  if (!HOTEL_CODE) {
    showError('Missing hotel code on user profile.');
    return;
  }
  // WHY: Fetching engine_json for all snapshots on load causes a
  // statement timeout. Only fetch lightweight fields for the dropdown.
  // Full engine_json is fetched per-snapshot when Compare is clicked.
  const { data, error } = await supabaseClient
    .from('engine_outputs')
    .select('id, snapshot_date, period_label')
    .eq('hotel_code', HOTEL_CODE)
    .not('snapshot_date', 'is', null)
    .order('snapshot_date', { ascending: false })
    .limit(30);

  if (error) {
    setLoading(false);
    showError(error.message || 'Could not load engine_outputs.');
    return;
  }

  snapshotRows = uniqueBy(data || [], r => r.snapshot_date);
  const selA = document.getElementById('snap-a');
  const selB = document.getElementById('snap-b');
  selA.innerHTML = '';
  selB.innerHTML = '';
  for (const row of snapshotRows) {
    const lab = escHtml(formatSnapLabel(row));
    const v = escHtml(row.snapshot_date);
    selA.insertAdjacentHTML('beforeend', `<option value="${v}">${lab}</option>`);
    selB.insertAdjacentHTML('beforeend', `<option value="${v}">${lab}</option>`);
  }

  if (snapshotRows.length >= 2) {
    selB.value = snapshotRows[0].snapshot_date;
    selA.value = snapshotRows[1].snapshot_date;
  } else if (snapshotRows.length === 1) {
    selB.value = snapshotRows[0].snapshot_date;
    selA.value = snapshotRows[0].snapshot_date;
  }

  setLoading(false);
  if (snapshotRows.length >= 2) {
    document.getElementById('weekly-app').style.display = 'block';
    runCompare();
  } else {
    document.getElementById('weekly-app').style.display = 'none';
    if (snapshotRows.length === 1) {
      showError('Only one snapshot exists — add another weekly engine run to compare.');
    } else {
      showError('No engine_outputs rows found for this hotel.');
    }
  }
}

function rowByDate(dateStr) {
  return snapshotRows.find(r => r.snapshot_date === dateStr) || null;
}

async function runCompare() {
  hideError();
  let dateA = document.getElementById('snap-a').value;
  let dateB = document.getElementById('snap-b').value;
  if (!dateA || !dateB) {
    showError('Select two snapshots.');
    return;
  }
  if (new Date(dateA) > new Date(dateB)) {
    const t = dateA; dateA = dateB; dateB = t;
    document.getElementById('snap-a').value = dateA;
    document.getElementById('snap-b').value = dateB;
  }

  const rowA = rowByDate(dateA);
  const rowB = rowByDate(dateB);
  if (!rowA || !rowB) {
    showError('Selected snapshot not found in loaded rows.');
    return;
  }

  const idA = rowA.id;
  const idB = rowB.id;

  // WHY: engine_json not loaded at dropdown time — fetch now for
  // only the two selected snapshots.
  setLoading(true);
  hideError();

  const { data: fetchedRows, error: fetchErr } = await supabaseClient
    .from('engine_outputs')
    .select('id, snapshot_date, period_label, engine_json')
    .in('id', [idA, idB]);

  if (fetchErr || !fetchedRows || fetchedRows.length < 2) {
    setLoading(false);
    showError(fetchErr?.message || 'Could not load snapshot data.');
    return;
  }

  const fullA = fetchedRows.find(r => r.id === idA);
  const fullB = fetchedRows.find(r => r.id === idB);
  const jsonA = fullA?.engine_json;
  const jsonB = fullB?.engine_json;

  if (!jsonA || !jsonB) {
    setLoading(false);
    showError('One or both snapshots have no engine data.');
    return;
  }

  setLoading(false);

  const ejA = unwrapEngineJson(jsonA);
  const ejB = unwrapEngineJson(jsonB);

  renderMovementStrip(ejA, ejB, dateA, dateB);
  renderPaceSection(ejA, ejB, dateA, dateB);
  renderSegmentSection(ejA, ejB);
  renderCorporateSection(ejA, ejB);
  renderGroupsSection(ejA, ejB);
  renderDecisionsSection(ejA, ejB, dateA, dateB);
}

function renderMovementStrip(ejA, ejB, dateA, dateB) {
  const strip = document.getElementById('movement-strip');
  const mA = extractMpiAriRgi(ejA);
  const mB = extractMpiAriRgi(ejB);
  const rnA = totalRnOtbTy(ejA);
  const rnB = totalRnOtbTy(ejB);

  const cells = [
    { label: 'MPI', valB: mB.mpi, a: mA.mpi, higherBetter: true },
    { label: 'ARI', valB: mB.ari, a: mA.ari, higherBetter: true },
    { label: 'RGI', valB: mB.rgi, a: mA.rgi, higherBetter: true },
    { label: 'Total RN OTB', valB: rnB, a: rnA, higherBetter: true }
  ];

  strip.innerHTML = cells.map(c => {
    const mov = movementArrowDelta(c.a, c.valB, c.higherBetter);
    const valDisp = c.label === 'Total RN OTB'
      ? (c.valB == null ? '—' : Math.round(c.valB).toLocaleString('en-GB'))
      : formatKpiDisplay(c.valB);
    return `<div class="kpi-cell">
      <div class="kpi-label">${escHtml(c.label)}</div>
      <div class="kpi-value">${escHtml(valDisp)}</div>
      <div class="kpi-sub"><span class="mov-arrow ${mov.cls}">${mov.arrow}</span><span class="${mov.cls}"> ${escHtml(mov.deltaStr)}</span> vs ${escHtml(dateA)}</div>
    </div>`;
  }).join('');
}

function renderPaceSection(ejA, ejB, dateA, dateB) {
  const pA = forwardByThreeWindows(ejA);
  const pB = forwardByThreeWindows(ejB);
  const rows = [];
  for (let i = 0; i < 3; i++) {
    const b = pB[i];
    const a = pA[i];
    const gB = b.metrics?.gapRn;
    const gA = a.metrics?.gapRn;
    const pctB = b.metrics?.gapPct;
    const pctA = a.metrics?.gapPct;
    const mov = gB != null && gA != null
      ? movementArrowDelta(gA, gB, false)
      : (pctB != null && pctA != null ? movementArrowDelta(pctA, pctB, true) : { arrow: '→', cls: 'mov-flat', deltaStr: '—', stable: true });
    const badge = paceStatusBadge(gB, gA, pctB, pctA);
    const fmtRn = v => v == null ? '—' : `${Math.round(v).toLocaleString('en-GB')} RN`;
    rows.push(`<tr>
      <td><strong>${escHtml(b.label)}</strong></td>
      <td>${escHtml(fmtRn(gB))}${pctB != null ? `<div class="nc-text" style="font-size:11px;color:var(--gray-500);">${escHtml(Number(pctB).toFixed(1))}% gap</div>` : ''}</td>
      <td>${escHtml(fmtRn(gA))}${pctA != null ? `<div class="nc-text" style="font-size:11px;color:var(--gray-500);">${escHtml(Number(pctA).toFixed(1))}% gap</div>` : ''}</td>
      <td><span class="mov-arrow ${mov.cls}">${mov.arrow}</span>${escHtml(mov.deltaStr)}</td>
      <td><span class="badge ${badge.cls}">${escHtml(badge.text)}</span></td>
    </tr>`);
  }

  const html = `
  <div class="nc-card">
    <div class="nc-header">
      <div class="nc-title">Forward windows — ${escHtml(dateB)} vs ${escHtml(dateA)}</div>
    </div>
    <div class="nc-body">
      <div class="nc-section" style="border:none;padding-top:4px;">
        <table class="wk-table">
          <thead><tr>
            <th>Window</th>
            <th>Gap (B) RN</th>
            <th>Gap (A) RN</th>
            <th>Movement</th>
            <th>Status</th>
          </tr></thead>
          <tbody>${rows.join('')}</tbody>
        </table>
        <p class="nc-text" style="margin-top:8px;font-size:11px;color:var(--gray-500);">Gap RN = reference − OTB (TY) when both exist; otherwise pace gap % is shown under the cell.</p>
      </div>
    </div>
  </div>`;
  document.getElementById('pace-section').innerHTML = html;
}

function renderSegmentSection(ejA, ejB) {
  const cardsA = Array.isArray(ejA?.segment_issue_cards) ? ejA.segment_issue_cards : [];
  const cardsB = Array.isArray(ejB?.segment_issue_cards) ? ejB.segment_issue_cards : [];
  const mapA = new Map();
  for (const c of cardsA) mapA.set(segmentKey(c), segmentStatus(c));
  const mapB = new Map();
  for (const c of cardsB) mapB.set(segmentKey(c), segmentStatus(c));
  const keys = new Set([...mapA.keys(), ...mapB.keys()]);
  const bodyRows = [];
  for (const seg of keys) {
    if (seg === '—' && !mapA.get(seg) && !mapB.get(seg)) continue;
    const rawA = mapA.get(seg) || '';
    const rawB = mapB.get(seg) || '';
    const ch = segmentChange(rawA, rawB);
    const bHasIssue = !!rawB;
    const changed = rawA !== rawB;
    const sa = readableScenarioLabel(rawA);
    const sb = readableScenarioLabel(rawB);
    if (!changed && !bHasIssue) continue;
    bodyRows.push(`<tr>
      <td>${escHtml(seg)}</td>
      <td>${escHtml(sa || '—')}</td>
      <td>${escHtml(sb || '—')}</td>
      <td>${escHtml(ch)}</td>
    </tr>`);
  }

  const empty = !bodyRows.length
    ? '<div class="nc-card"><div class="nc-body"><p class="nc-text">No segment signal changes for this pair.</p></div></div>'
    : `<div class="nc-card"><div class="nc-header"><div class="nc-title">Scenario type movement</div></div>
      <div class="nc-body"><div class="nc-section" style="border:none;">
        <table class="wk-table"><thead><tr>
          <th>Segment</th><th>Status A</th><th>Status B</th><th>Change</th>
        </tr></thead><tbody>${bodyRows.join('')}</tbody></table>
      </div></div></div>`;
  document.getElementById('segment-section').innerHTML = empty;
}

function renderCorporateSection(ejA, ejB) {
  const accA = allAccountsAtRisk(ejA);
  const accB = allAccountsAtRisk(ejB);
  const mapA = new Map();
  for (const a of accA) {
    const k = accountCompanyKey(a);
    if (k) mapA.set(k, a);
  }

  const newRisk = [], worsened = [], unchanged = [], recovered = [];

  // Accounts in B — classify vs A
  for (const b of accB) {
    const k = accountCompanyKey(b);
    if (!k) continue;
    const a = mapA.get(k);
    if (!a) { newRisk.push({ a: null, b }); continue; }
    const va = num(a.variance_rn);
    const vb = num(b.variance_rn);
    if (va == null || vb == null) { unchanged.push({ a, b }); continue; }
    if (vb < va - 1) worsened.push({ a, b });
    else if (vb > va + 1) recovered.push({ a, b, kind: 'improved' });
    else unchanged.push({ a, b });
  }

  // Accounts in A but not B — off the at-risk list
  const offList = [];
  for (const [k, a] of mapA) {
    if (!accB.find(b => accountCompanyKey(b) === k)) {
      offList.push({ a, b: null, kind: 'off_list' });
    }
  }

  function rowHtml(x) {
    const src = x.b || x.a;
    const name = escHtml(src.company_name || src.account_name || '—');
    const mgr = escHtml(src.account_manager || '—');
    const va = x.a ? num(x.a.variance_rn) : null;
    const vb = x.b ? num(x.b.variance_rn) : null;
    const fmt = v => v == null ? '—' : `${Math.round(v)} RN`;
    let mov = '—';
    if (x.kind === 'off_list') {
      mov = '<span class="mov-up">▲ Off at-risk list</span>';
    } else if (va != null && vb != null) {
      const m = movementArrowDelta(va, vb, true);
      mov = `<span class="${m.cls}">${m.arrow} ${escHtml(m.deltaStr)}</span>`;
    }
    return `<tr><td>${name}</td><td>${mgr}</td><td>${escHtml(fmt(va))}</td><td>${escHtml(fmt(vb))}</td><td>${mov}</td></tr>`;
  }

  const block = (title, rows, emptyMsg) => {
    if (!rows.length) return `<div class="nc-section"><div class="sub-h">${escHtml(title)}</div><p class="nc-text">${escHtml(emptyMsg)}</p></div>`;
    return `<div class="nc-section"><div class="sub-h">${escHtml(title)}</div>
      <table class="wk-table"><thead><tr>
        <th>Company</th><th>Account mgr</th><th>Var A</th><th>Var B</th><th>Movement</th>
      </tr></thead><tbody>${rows.map(rowHtml).join('')}</tbody></table></div>`;
  };

  document.getElementById('corporate-section').innerHTML = `
  <div class="nc-card">
    <div class="nc-header"><div class="nc-title">Corporate pace — at-risk accounts</div></div>
    <div class="nc-body">
      ${block('New at-risk this week', newRisk, 'None.')}
      ${block('Worsened', worsened, 'None.')}
      ${block('Unchanged', unchanged, 'None.')}
      ${block('Recovered / off at-risk list', [...recovered, ...offList], 'None.')}
    </div>
  </div>`;
}

function renderGroupsSection(ejA, ejB) {
  // WHY: Compare group pipeline status between snapshots.
  // Surface: newly converted, turned down, new tentatives, disappeared.
  // Source: group_pipeline_issues[].groups[] array in each snapshot.
  function extractGroups(ej) {
    const issues = Array.isArray(ej?.group_pipeline_issues)
      ? ej.group_pipeline_issues : [];
    const map = new Map();
    for (const issue of issues) {
      const groups = Array.isArray(issue.groups) ? issue.groups : [];
      for (const g of groups) {
        // WHY: Engine stores group name as group_name only — g.name does
        // not exist. Key on lowercase group_name for cross-snapshot matching.
        const name = String(g.group_name || '').trim();
        if (!name) continue;
        const key = name.toLowerCase();
        // Keep the entry with the most recent data (B wins over A)
        map.set(key, { ...g, _name: name });
      }
    }
    return map;
  }

  function grpRow(label, grp, note) {
    const rn = grp.room_nights != null ? Math.round(grp.room_nights) + ' RN' : '—';
    const rev = grp.room_revenue != null
      ? '€' + Math.round(grp.room_revenue).toLocaleString('en-GB') : '—';
    const arr = grp.arrival_date || '—';
    const owner = grp.owner || grp.sales_manager || '—';
    const status = grp.status || '—';
    // WHY: group_name is the correct field — _name is the normalized copy
    return `<tr>
      <td><strong>${escHtml(grp._name || grp.group_name || '—')}</strong></td>
      <td>${escHtml(rn)} / ${escHtml(rev)}</td>
      <td>${escHtml(arr)}</td>
      <td>${escHtml(owner)}</td>
      <td>${escHtml(note || status)}</td>
    </tr>`;
  }

  const gA = extractGroups(ejA);
  const gB = extractGroups(ejB);

  // WHY: If snapshot A has no group data (group_pipeline_issues empty
  // because forecast gap issues didn't fire), show B groups as baseline
  // with a note that A had no data — rather than all None.
  const noDataA = gA.size === 0;
  const noDataB = gB.size === 0;

  if (noDataB) {
    document.getElementById('groups-section').innerHTML =
      '<div class="nc-card"><div class="nc-body"><p class="nc-text">No group pipeline data in snapshot B.</p></div></div>';
    return;
  }

  // If A has no data, show all B groups as "current pipeline" baseline
  if (noDataA) {
    const baselineRows = [...gB.values()]
      .map(g => grpRow('', g, g.status || '—'))
      .join('');
    document.getElementById('groups-section').innerHTML = `
    <div class="nc-card">
      <div class="nc-header"><div class="nc-title">Group pipeline — current snapshot only</div></div>
      <div class="nc-body">
        <div class="nc-section">
          <p class="nc-text" style="margin-bottom:8px;font-size:12px;color:var(--gray-500);">
            No group pipeline data in snapshot A — showing current snapshot B as baseline.
          </p>
          <table class="wk-table"><thead><tr>
            <th>Group</th><th>RN / Revenue</th><th>Arrival</th><th>Owner</th><th>Status</th>
          </tr></thead><tbody>${baselineRows}</tbody></table>
        </div>
      </div>
    </div>`;
    return;
  }

  const converted = [];
  const turnedDown = [];
  const newTentative = [];
  const statusChanged = [];

  for (const [key, grpA] of gA) {
    const grpB = gB.get(key);
    const stA = String(grpA.status || '').toLowerCase().trim();
    const stB = grpB ? String(grpB.status || '').toLowerCase().trim() : null;

    if (!grpB) {
      if (stA === 'tentative' || stA === 'prospect') {
        converted.push({ grp: grpA, note: 'No longer in pipeline — converted or removed' });
      }
      continue;
    }
    if (stA === stB) continue;

    const isTurnedDown = /turn|cancel|declin|lost|refused/i.test(stB);
    if (isTurnedDown) {
      turnedDown.push({ grpA, grpB });
    } else {
      statusChanged.push({ grpA, grpB });
    }
  }

  for (const [key, grpB] of gB) {
    if (!gA.has(key)) newTentative.push({ grp: grpB });
  }

  function block(title, rows, emptyMsg) {
    if (!rows.length) return `<div class="nc-section"><div class="sub-h">${escHtml(title)}</div><p class="nc-text">${escHtml(emptyMsg)}</p></div>`;
    return `<div class="nc-section"><div class="sub-h">${escHtml(title)}</div>
      <table class="wk-table"><thead><tr>
        <th>Group</th><th>RN / Revenue</th><th>Arrival</th><th>Owner</th><th>Status / Note</th>
      </tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  document.getElementById('groups-section').innerHTML = `
  <div class="nc-card">
    <div class="nc-header"><div class="nc-title">Group pipeline movement</div></div>
    <div class="nc-body">
      ${block('Converted / removed from pipeline', converted.map(x => grpRow('', x.grp, x.note)), 'None.')}
      ${block('Turned down / cancelled', turnedDown.map(x => grpRow('', x.grpB, x.grpB.status)), 'None.')}
      ${block('New in pipeline this week', newTentative.map(x => grpRow('', x.grp, x.grp.status)), 'None.')}
      ${block('Status changed', statusChanged.map(x => grpRow('', x.grpB, x.grpA.status + ' → ' + x.grpB.status)), 'None.')}
    </div>
  </div>`;
}

function renderDecisionsSection(ejA, ejB, dateA, dateB) {
  const decB = [...collectSegmentDecisions(ejB)];
  const causalB = collectCausalDecision(ejB);
  if (causalB) decB.push(causalB);

  const mapA = new Map(collectSegmentDecisions(ejA).map(d => [d.finding_key, d.line]));
  const causalA = collectCausalDecision(ejA);
  if (causalA) mapA.set(causalA.finding_key, causalA.line);

  const open = [];
  const seenFk = new Set();
  for (const d of decB) {
    if (!mapA.has(d.finding_key) || !d.line) continue;
    if (seenFk.has(d.finding_key)) continue;
    seenFk.add(d.finding_key);
    open.push({ fk: d.finding_key, text: d.line });
  }

  if (!open.length) {
    document.getElementById('decisions-section').innerHTML =
      '<div class="nc-card"><div class="nc-body"><p class="nc-text">No enforced decisions carried over with the same finding key between snapshots.</p></div></div>';
    return;
  }

  const rows = open.map(o => `<tr>
    <td>${escHtml(o.text)}</td>
    <td>${escHtml(dateA)}</td>
    <td><span class="still-open">Still open</span></td>
  </tr>`).join('');

  document.getElementById('decisions-section').innerHTML = `
  <div class="nc-card">
    <div class="nc-header"><div class="nc-title">Open decisions (${escHtml(dateB)})</div></div>
    <div class="nc-body">
      <div class="nc-section" style="border:none;">
        <p class="nc-text" style="margin-bottom:10px;">Same finding in snapshot A with a decision line still present in B.</p>
        <table class="wk-table"><thead><tr>
          <th>Decision</th><th>First seen (A)</th><th></th>
        </tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>
  </div>`;
}

document.getElementById('btn-compare').addEventListener('click', () => {
  hideError();
  runCompare();
});

loadSnapshots();
</script>
