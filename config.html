function norm(v) {
  return (v || '').toString().trim().toLowerCase().replace(/[_\-]+/g, ' ').replace(/\s+/g, ' ');
}

function showError(message) {

function getJwtClaimHotelCode(session) {
  const claimFromMeta = session?.user?.user_metadata?.hotel || session?.user?.user_metadata?.hotel_code || session?.user?.app_metadata?.hotel_code;
  if (claimFromMeta) return claimFromMeta;
  const token = session?.access_token;
  if (!token) return '';
  try {
    const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    return payload.hotel_code || payload.hotel || '';
  } catch {
    return '';
  }
}

function bestHeaderMatch(headers, aliases) {
  let best = { header: null, score: 0 };
  for (const header of headers) {
    const nHeader = norm(header);
    for (const alias of aliases) {
      const nAlias = norm(alias);
      let score = 0;
      if (nHeader === nAlias) score = 1;
      else if (nHeader.includes(nAlias) || nAlias.includes(nHeader)) score = 0.86;
      else {
        const headerWords = new Set(nHeader.split(' '));
        const aliasWords = nAlias.split(' ');
        const overlap = aliasWords.filter((w) => headerWords.has(w)).length;
        score = overlap / Math.max(aliasWords.length, 1);
      }
      if (score > best.score) best = { header, score };
    }
  }
  return best;
}

function suggestTabMatch(key, sheetNames) {
  const hints = TAB_TYPES.find((t) => t.key === key).hints;
  let top = { name: null, score: 0 };
  for (const sheetName of sheetNames) {
    const ns = norm(sheetName);
    const score = hints.reduce((acc, h) => acc + (ns.includes(h) ? 1 : 0), 0);
    if (score > top.score) top = { name: sheetName, score };
  }
  return top.score > 0 ? top.name : null;
}

function parseNumber(value) {
  if (value === null || value === undefined || value === '') return null;
  if (typeof value === 'number') return value;
  const cleaned = value.toString().replace(/[^0-9.\-]/g, '');
  const num = Number(cleaned);
  return Number.isFinite(num) ? num : null;
}

function excelSerialToDate(serial) {
  const base = new Date(Date.UTC(1899, 11, 30));
  return new Date(base.getTime() + serial * 86400000);
}

function parseDateValue(value) {
  if (value === null || value === undefined || value === '') return { ok: false, format: null };
  if (typeof value === 'number' && value > 25000 && value < 70000) {
    const d = excelSerialToDate(value);
    return Number.isNaN(d.getTime()) ? { ok: false, format: null } : { ok: true, format: 'Excel Serial', date: d };
  }
  const s = value.toString().trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    const d = new Date(s);
    return Number.isNaN(d.getTime()) ? { ok: false, format: null } : { ok: true, format: 'YYYY-MM-DD', date: d };
  }
  const slash = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (slash) {
    const a = Number(slash[1]);
    const b = Number(slash[2]);
    const y = Number(slash[3]);
    if (a > 12) return { ok: true, format: 'DD/MM/YYYY', date: new Date(Date.UTC(y, b - 1, a)) };
    if (b > 12) return { ok: true, format: 'MM/DD/YYYY', date: new Date(Date.UTC(y, a - 1, b)) };
    return { ok: true, format: 'DD/MM/YYYY', date: new Date(Date.UTC(y, b - 1, a)) };
  }
  const d = new Date(s);
  return Number.isNaN(d.getTime()) ? { ok: false, format: null } : { ok: true, format: 'YYYY-MM-DD', date: d };
}

  const chooseBtn = document.getElementById('choose-file-btn');
  const status = document.getElementById('file-status');

  fileInput.addEventListener('change', (e) => {
    if (e.target.files[0]) handleFile(e.target.files[0]);

  ['dragenter', 'dragover'].forEach((ev) => dropzone.addEventListener(ev, (e) => {

  });

  if (state.fileName) {
    status.textContent = `Loaded: ${state.fileName} (${state.sheetNames.length} sheets found)`;
  }
}

async function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['xlsx', 'xlsm'].includes(ext)) {
    showError('Please upload a valid .xlsx or .xlsm file.');
    return;
  }
  clearError();
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const workbook = XLSX.read(evt.target.result, { type: 'array' });
      state.workbook = workbook;
      state.fileName = file.name;
      state.sheetNames = workbook.SheetNames || [];
      state.sheetsWithHeaders = {};
      state.sheetRowsPreview = {};
      for (const sheetName of state.sheetNames) {
        const ws = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: '' });
        const limitedRows = rows.slice(0, 500);
        // Scan the first 5 rows to find the actual header row.
        // The header row is the first row that has 3 or more non-empty string cells.
        // This handles sheets where row 0 is a title or blank line above the real headers.
        let headers = [];
        for (let i = 0; i < Math.min(5, limitedRows.length); i++) {
          const candidate = (limitedRows[i] || []).map((h) => (h || '').toString().trim()).filter(Boolean);
          if (candidate.length >= 3) {
            headers = candidate;
            // Trim the preview rows to start from the row after the header row
            state.sheetRowsPreview[sheetName] = limitedRows.slice(i);
            break;
          }
        }
        state.sheetsWithHeaders[sheetName] = headers;
        console.log('Sheet:', sheetName, '| Headers found:', headers);
      }
      for (const tab of TAB_TYPES) {
        state.tabMapping[tab.key] = suggestTabMatch(tab.key, state.sheetNames);
      }
      setStep(2);
    } catch {
      showError('We could not read this workbook. Please verify the file is a valid Excel export.');
    }
  };
  reader.readAsArrayBuffer(file);
}

function renderTabStep() {
  const body = document.getElementById('step-body');
  const options = (selected) => `
    <option value="">Not in my file</option>
    ${state.sheetNames.map((name) => `<option ${selected === name ? 'selected' : ''} value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('')}
  `;
  body.innerHTML = `
    <div class="section-title">Identify each data tab</div>
    <p class="hint">We pre-selected likely matches. Confirm or adjust before continuing.</p>
    ${TAB_TYPES.map((t) => `
      <div class="field-row">
        <div><strong>${t.label}</strong></div>
        <div><select data-tab-key="${t.key}">${options(state.tabMapping[t.key])}</select></div>
      </div>
    `).join('')}
    <div class="actions">
      <div></div>
      <div class="right">
        <button class="btn btn-primary" id="next-step2">Continue</button>
      </div>
    </div>
  `;
  body.querySelectorAll('select[data-tab-key]').forEach((el) => {
    el.addEventListener('change', (e) => {
      state.tabMapping[e.target.dataset.tabKey] = e.target.value || null;
    });
  });
  document.getElementById('next-step2').addEventListener('click', () => {
    autoPopulateColumnMappings();
    setStep(3);
  });
}

function autoPopulateColumnMappings() {
  for (const tab of TAB_TYPES) {
    const key = tab.key;
    const selectedSheet = state.tabMapping[key];
    const targetMapping = {};
    const targetMeta = {};
    if (!selectedSheet) {
      state.columnMapping[`${key}_columns`] = {};
      state.autoMeta[key] = {};
      continue;
    }
    const headers = state.sheetsWithHeaders[selectedSheet] || [];
    for (const [canonical] of CANONICAL_FIELDS[key]) {
      const aliases = ALIASES[key][canonical] || [canonical];
      const best = bestHeaderMatch(headers, aliases);
      if (best.header && best.score >= 0.86) {
        targetMapping[canonical] = best.header;
      } else {
        targetMapping[canonical] = '';
      }
      targetMeta[canonical] = { score: best.score };
    }
    state.columnMapping[`${key}_columns`] = targetMapping;
    state.autoMeta[key] = targetMeta;
  }
}

function autoBadge() {
  return `<span class="pill">
    <svg class="check-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#6B6B67" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Auto-matched
  </span>`;
}

function renderColumnStep() {
  const body = document.getElementById('step-body');
  const blocks = [];
  for (const tab of TAB_TYPES) {
    const key = tab.key;
    const sheetName = state.tabMapping[key];
    if (!sheetName) continue;
    const headers = state.sheetsWithHeaders[sheetName] || [];
    const rows = [];
    const autoRows = [];
    for (const [canonical, label] of CANONICAL_FIELDS[key]) {
      const mapped = state.columnMapping[`${key}_columns`][canonical] || '';
      const score = state.autoMeta[key]?.[canonical]?.score || 0;
      const highConfidence = mapped && score >= 0.86;
      const html = `
        <div class="field-row ${highConfidence ? 'auto-row' : 'warn-row'}">
          <div>
            <strong>${escapeHtml(canonical)}</strong>
            <small>${escapeHtml(label)}</small>
            ${highConfidence ? autoBadge() : '<small style="color:#8d6506;">Needs review</small>'}
          </div>
          <div>
            <select data-type="${key}" data-canonical="${canonical}">
              <option value="">Not in my file</option>
              ${headers.map((h) => `<option ${mapped === h ? 'selected' : ''} value="${escapeHtml(h)}">${escapeHtml(h)}</option>`).join('')}
            </select>
          </div>
        </div>
      `;
      if (highConfidence) autoRows.push(html);
      else rows.push(html);
    }
    blocks.push(`
      <div class="section-title">${tab.label} <span class="subtle">(${escapeHtml(sheetName)})</span></div>
      <p class="hint">Match Aithenor fields to this tab's actual headers.</p>
      ${rows.join('') || '<div class="hint">No uncertain rows found.</div>'}
      ${autoRows.length ? `<button class="toggle-link" data-toggle-auto="${key}">${state.showAuto[key] ? 'Hide' : 'Review'} auto-matched fields (${autoRows.length})</button>` : ''}
      <div class="${state.showAuto[key] ? '' : 'hidden'}" id="auto-${key}">${autoRows.join('')}</div>
    `);
  }
  body.innerHTML = `
    ${blocks.join('') || '<div class="hint">No tabs selected in Step 2.</div>'}
    <div class="actions">
      <button class="btn btn-secondary" id="back-step3">Back</button>
      <div class="right"><button class="btn btn-primary" id="next-step3">Continue</button></div>
    </div>
  `;

  body.querySelectorAll('select[data-type]').forEach((el) => {
    el.addEventListener('change', (e) => {
      const type = e.target.dataset.type;
      const canonical = e.target.dataset.canonical;
      state.columnMapping[`${type}_columns`][canonical] = e.target.value || '';
    });
  });
  body.querySelectorAll('button[data-toggle-auto]').forEach((el) => {
    el.addEventListener('click', (e) => {
      const key = e.target.dataset.toggleAuto;
      state.showAuto[key] = !state.showAuto[key];
      renderColumnStep();
    });
  });
  document.getElementById('back-step3').addEventListener('click', () => setStep(2));
  document.getElementById('next-step3').addEventListener('click', () => {
    prepareSegmentRows();
    if (!state.tabMapping.pms) {
      setStep(5);
      runValidation();
      return;
    }
    setStep(4);
  });
}

function prepareSegmentRows() {
  state.segmentMapping = {};
  const pmsSheet = state.tabMapping.pms;
  if (!pmsSheet) return;
  const segmentHeader = mappedHeader('pms', 'segment_code');
  if (!segmentHeader) return;
  const rows = getSelectedSheetRows('pms');
  const headers = rows[0] || [];
  const idx = headers.findIndex((h) => h === segmentHeader);
  if (idx < 0) return;
  const uniqueCodes = new Set();
  for (const row of rows.slice(1, 500)) {
    const code = (row[idx] || '').toString().trim();
    if (code) uniqueCodes.add(code);
  }
  for (const code of Array.from(uniqueCodes).sort()) {
    const suggested = SEGMENT_SUGGESTIONS[code.toUpperCase()] || 'na';
    state.segmentMapping[code] = {
      usali_key: suggested
    };
  }
}

function renderSegmentStep() {
  const body = document.getElementById('step-body');
  const entries = Object.entries(state.segmentMapping);

  const usaliOptions = USALI_SEGMENTS.map((s) =>
    `<option value="${s.key}">${s.label}</option>`
  ).join('');

  body.innerHTML = `
    <div class="section-title">Map your segment codes to USALI</div>
    <p class="hint">Each code detected in your PMS file is mapped to the USALI standard segmentation. Review and adjust where needed. Select "Exclude" for complimentary, house use, or out-of-order rooms.</p>
    <div class="table-grid table-head" style="grid-template-columns: 0.6fr 1fr;">
      <div>Your PMS code</div><div>USALI segment</div>
    </div>
    ${entries.map(([code, v]) => `
      <div class="table-grid ${v.usali_key === 'na' ? 'warn-row' : ''}" style="grid-template-columns: 0.6fr 1fr;">
        <div><strong>${escapeHtml(code)}</strong></div>
        <div>
          <select data-code="${escapeHtml(code)}" style="width:100%; padding:8px 10px; border:1px solid var(--gray-300); border-radius:4px; font-size:12px;">
            ${USALI_SEGMENTS.map((s) =>
              `<option value="${s.key}" ${v.usali_key === s.key ? 'selected' : ''}>${s.label}</option>`
            ).join('')}
          </select>
        </div>
      </div>
    `).join('') || '<div class="hint">No segment codes found from the first 500 PMS rows.</div>'}
    <div class="actions">
      <button class="btn btn-secondary" id="back-step4">Back</button>
      <div class="right"><button class="btn btn-primary" id="next-step4">Continue</button></div>
    </div>
  `;

  body.querySelectorAll('select[data-code]').forEach((el) => {
    el.addEventListener('change', (e) => {
      state.segmentMapping[e.target.dataset.code].usali_key = e.target.value;
    });
  });
  document.getElementById('back-step4').addEventListener('click', () => setStep(3));
  document.getElementById('next-step4').addEventListener('click', () => {
    setStep(5);
    runValidation();
  });
}

function validateField(name, ok, warnText) {
  return { name, ok, text: ok ? `${name} looks valid.` : warnText };
}

function average(arr) {
  if (!arr.length) return 0;
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}

function runValidation() {
  state.validationResults = [];
  state.detectedDateFormat = '';
  const pmsSheet = state.tabMapping.pms;
  if (!pmsSheet) {
    state.validationResults.push({ name: 'PMS validation', ok: true, text: 'No PMS tab selected. Mapping can still be saved.' });
    renderValidationStep();
    return;
  }
  const rows = getSelectedSheetRows('pms');
  if (rows.length < 2) {
    state.validationResults.push({ name: 'PMS sample data', ok: false, text: 'No PMS sample rows were found for validation in the first 500 rows.' });
    renderValidationStep();
    return;
  }

  const headers = rows[0];
  const sample = rows.slice(1, 11);
  const getValues = (canonical) => {
    const header = mappedHeader('pms', canonical);
    if (!header) return [];
    const idx = headers.findIndex((h) => h === header);
    if (idx < 0) return [];
    return sample.map((r) => r[idx]).filter((v) => v !== '' && v !== null && v !== undefined);
  };

  const dateVals = getValues('date');
  const dateParsed = dateVals.map(parseDateValue);
  const validDateCount = dateParsed.filter((d) => d.ok).length;
  const dateFormats = dateParsed.filter((d) => d.ok && d.format).map((d) => d.format);
  const formatFreq = {};
  for (const fmt of dateFormats) formatFreq[fmt] = (formatFreq[fmt] || 0) + 1;
  state.detectedDateFormat = Object.entries(formatFreq).sort((a, b) => b[1] - a[1])[0]?.[0] || '';
  state.validationResults.push(validateField(
    'Date field',
    validDateCount === dateVals.length && dateVals.length > 0,
    'Some date values could not be parsed. Please verify your date column mapping.'
  ));

  const rnTy = getValues('rn_ty').map(parseNumber);
  const rnLy = getValues('rn_ly').map(parseNumber);
  const rnOk = [...rnTy, ...rnLy].every((n) => n !== null && n >= 0 && Number.isFinite(n));
  state.validationResults.push(validateField(
    'Room nights fields',
    rnOk && (rnTy.length + rnLy.length > 0),
    'Room nights include non-numeric values. Please confirm rn_ty and rn_ly mappings.'
  ));

  const revTy = getValues('rev_ty').map(parseNumber);
  const revLy = getValues('rev_ly').map(parseNumber);
  const revOk = [...revTy, ...revLy].every((n) => n !== null && n >= 0);
  state.validationResults.push(validateField(
    'Revenue fields',
    revOk && (revTy.length + revLy.length > 0),
    'Revenue values include non-numeric entries. Please confirm rev_ty and rev_ly mappings.'
  ));

  const adrTy = getValues('adr_ty').map(parseNumber).filter((n) => n !== null);
  const adrLy = getValues('adr_ly').map(parseNumber).filter((n) => n !== null);
  const adrVals = [...adrTy, ...adrLy];
  const adrWithin = adrVals.every((v) => v >= 10 && v <= 10000);
  const avgAdr = average(adrVals);
  state.validationResults.push(validateField(
    'ADR fields',
    adrVals.length > 0 && adrWithin,
    `ADR values appear unusual — average is €${Math.round(avgAdr || 0)}. Please confirm ADR and revenue mappings.`
  ));

  renderValidationStep();
}

function renderValidationStep() {
  const body = document.getElementById('step-body');
  const warnings = state.validationResults.filter((r) => !r.ok);
  body.innerHTML = `
    <div class="section-title">Validation results</div>
    <p class="hint">Checks are based on the first 10 PMS data rows using your selected mappings.</p>
    ${state.validationResults.map((r) => `
      <div class="${r.ok ? 'status-ok' : 'status-warn'}">
        <span class="dot">${r.ok ? '✓' : '!'}</span>
        <div><strong>${escapeHtml(r.name)}:</strong> ${escapeHtml(r.text)}</div>
      </div>
    `).join('')}
    <div class="actions">
      <button class="btn btn-secondary" id="back-step5">${state.tabMapping.pms ? 'Back' : 'Back to column mapping'}</button>
      <div class="right">
        ${warnings.length ? '<button class="btn btn-ghost" id="save-anyway">Save anyway</button>' : ''}
        <button class="btn btn-primary" id="save-confirm">Confirm and save</button>
      </div>
    </div>
  `;
  document.getElementById('back-step5').addEventListener('click', () => setStep(state.tabMapping.pms ? 4 : 3));
  if (document.getElementById('save-anyway')) {
    document.getElementById('save-anyway').addEventListener('click', () => saveMapping());
  }
  document.getElementById('save-confirm').addEventListener('click', () => saveMapping());
}

function buildPayload() {
  const segmentMapping = {};
  for (const [code, v] of Object.entries(state.segmentMapping)) {
    segmentMapping[code] = { usali_key: v.usali_key };
  }
  const excludeSegments = Object.entries(state.segmentMapping)
    .filter(([, v]) => v.usali_key === 'exclude')
    .map(([code]) => code);
  return {
    hotel_code: state.hotelCode,
    tab_mapping: state.tabMapping,
    column_mapping: state.columnMapping,
    segment_mapping: segmentMapping,
    exclude_segments: excludeSegments,
    date_format: state.detectedDateFormat || null,
    updated_at: new Date().toISOString()
  };
}

async function saveMapping() {
  clearError();
  const payload = buildPayload();
  if (!payload.hotel_code) {
    showError('Hotel code is missing from your authenticated session.');
    return;
  }
  const { error } = await supabaseClient.from('hotel_mappings').upsert(payload, { onConflict: 'hotel_code' });
  if (error) {
    showError('Could not save mapping right now. Please try again in a moment.');
    return;
  }
  renderSuccess();
}

function renderSuccess() {
  const body = document.getElementById('step-body');
  document.getElementById('step-line').textContent = 'Configuration complete';
  document.getElementById('step-desc').textContent = 'Mapping saved';
  document.getElementById('progress-fill').style.width = '100%';
  body.innerHTML = `
    <div class="success-box">
      <div class="success-title">Your data mapping is saved.</div>
      <p class="subtle">Future uploads will be processed automatically.</p>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="return-dashboard">Return to dashboard</button>
      </div>
    </div>
  `;
  document.getElementById('return-dashboard').addEventListener('click', () => {
    window.location.href = './index.html';
  });
}

function escapeHtml(value) {
  return (value || '').toString()
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function boot() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    window.location.href = './index.html';
    return;
  }
  state.hotelCode = getJwtClaimHotelCode(session);
  if (!state.hotelCode) {
    showError('No hotel_code claim found in your session. Please contact your administrator.');
  }
  renderStep();
}

boot();
