// Deterministic prefix/exact rules for PMS short codes → USALI 12th Edition segments.
// Rules are case-insensitive (input uppercased) and evaluated top-to-bottom; first match wins.
function autoSuggestAithenorSegment(code) {
  const upper = (code || '').toString().trim().toUpperCase();
  if (!upper) return null;
  if (upper === 'BAR')              return 'Transient – Retail';          // best-available / rack rate
  if (upper.startsWith('DISC_'))    return 'Transient – Discount';        // promotional discounts (prefix)
  if (upper === 'GOV')              return 'Transient – Qualified';        // government rate
  if (upper === 'LOYALTY')          return 'Transient – Qualified';        // loyalty-redemption stays
  if (upper.startsWith('CNR_'))     return 'Transient – Negotiated';      // chain/global negotiated (prefix)
  if (upper.startsWith('LNR_'))     return 'Transient – Negotiated';      // local negotiated rate (prefix)
  if (upper === 'CONS')             return 'Transient – Negotiated';       // consortia accounts
  if (upper.startsWith('IT_'))      return 'Transient – Wholesale';       // IT / tour-operator net rate (prefix)
  if (upper.startsWith('MKT_'))     return 'Transient – Wholesale';       // OTA / package net rate (prefix)
  if (upper === 'CONV')             return 'Group – Association/Convention'; // convention / trade-show groups
  if (upper === 'CMTG')             return 'Group – Corporate';            // corporate meeting groups
  if (upper === 'GT')               return 'Group – Tour/Wholesale';       // group tour / wholesaler
  if (upper === 'SMRF')             return 'Group – SMERF';                // social/military/edu/religious/fraternal
  if (upper === 'PERM')             return 'Contract';                     // permanent / extended-stay guest
  if (['CMP', 'HOU'].includes(upper)) return 'Non-revenue';               // complimentary & house-use
  return null;
}

function norm(v) {
  return (v || '').toString().trim().toLowerCase().replace(/[_\-]+/g, ' ').replace(/\s+/g, ' ');
}

// Score rows for canonical PMS/STR headers so G3 metadata rows are skipped.
function detectHeaderRowIndex(rows) {
  const aliasPool = [];
  for (const tab of TAB_TYPES) {
    for (const [canonical] of CANONICAL_FIELDS[tab.key]) {
      const aliases = ALIASES[tab.key][canonical] || [canonical];
      aliasPool.push(...aliases.map((a) => norm(a)));
    }
  }
  let best = { index: 0, score: 0 };
  for (let i = 0; i < Math.min(20, rows.length); i++) {
    const headers = (rows[i] || []).map((h) => norm(h)).filter(Boolean);
    if (headers.length < 3) continue;
    const score = headers.reduce((acc, h) => acc + (aliasPool.some((a) => h === a || h.includes(a) || a.includes(h)) ? 1 : 0), 0);
    if (score > best.score) best = { index: i, score };
  }
  if (best.score >= 2) return best.index;
  for (let i = 0; i < Math.min(5, rows.length); i++) {
    const candidate = (rows[i] || []).map((h) => (h || '').toString().trim()).filter(Boolean);
    if (candidate.length >= 3) return i;
  }
  return 0;
}

function readSavedAithenorSegment(entry) {

  if (entry.aithenor_segment) return entry.aithenor_segment;
  // Legacy USALI exclude flag maps to Non-revenue for backward compatibility.
  if (entry.usali_key === 'exclude') return 'Non-revenue';
  return null;
}

function getJwtClaimHotelCode(session) {
  const claimFromMeta = session?.user?.user_metadata?.hotel || session?.user?.user_metadata?.hotel_code || session?.user?.app_metadata?.hotel_code;
  if (claimFromMeta) return claimFromMeta;
  const token = session?.access_token;
  if (!token) return '';
  try {
    const payload = JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
    return payload.hotel_code || payload.hotel || '';
  } catch {
    return '';
  }
}

function bestHeaderMatch(headers, aliases) {
  let best = { header: null, score: 0 };
  for (const header of headers) {
    const nHeader = norm(header);
    for (const alias of aliases) {
      const nAlias = norm(alias);
      let score = 0;
      if (nHeader === nAlias) score = 1;
      else if (nHeader.includes(nAlias) || nAlias.includes(nHeader)) score = 0.86;
      else {
        const headerWords = new Set(nHeader.split(' '));
        const aliasWords = nAlias.split(' ');
        const overlap = aliasWords.filter((w) => headerWords.has(w)).length;
        score = overlap / Math.max(aliasWords.length, 1);
      }
      if (score > best.score) best = { header, score };
    }
  }
  return best;
}

function suggestTabMatch(key, sheetNames) {
  const hints = TAB_TYPES.find((t) => t.key === key).hints;
  let top = { name: null, score: 0 };
  for (const sheetName of sheetNames) {
    const ns = norm(sheetName);
    const score = hints.reduce((acc, h) => acc + (ns.includes(h) ? 1 : 0), 0);
    if (score > top.score) top = { name: sheetName, score };
  }
  return top.score > 0 ? top.name : null;
}

function parseNumber(value) {
  if (value === null || value === undefined || value === '') return null;
  if (typeof value === 'number') return value;
  const cleaned = value.toString().replace(/[^0-9.\-]/g, '');
  const num = Number(cleaned);
  return Number.isFinite(num) ? num : null;
}

function excelSerialToDate(serial) {
  const base = new Date(Date.UTC(1899, 11, 30));
  return new Date(base.getTime() + serial * 86400000);
}

function parseDateValue(value) {
  if (value === null || value === undefined || value === '') return { ok: false, format: null };
  if (typeof value === 'number' && value > 25000 && value < 70000) {
    const d = excelSerialToDate(value);
    return Number.isNaN(d.getTime()) ? { ok: false, format: null } : { ok: true, format: 'Excel Serial', date: d };
  }
  const s = value.toString().trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) {
    const d = new Date(s);
    return Number.isNaN(d.getTime()) ? { ok: false, format: null } : { ok: true, format: 'YYYY-MM-DD', date: d };
  }
  const slash = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (slash) {
    const a = Number(slash[1]);
    const b = Number(slash[2]);
    const y = Number(slash[3]);
    if (a > 12) return { ok: true, format: 'DD/MM/YYYY', date: new Date(Date.UTC(y, b - 1, a)) };
    if (b > 12) return { ok: true, format: 'MM/DD/YYYY', date: new Date(Date.UTC(y, a - 1, b)) };
    return { ok: true, format: 'DD/MM/YYYY', date: new Date(Date.UTC(y, b - 1, a)) };
  }
  const d = new Date(s);
  return Number.isNaN(d.getTime()) ? { ok: false, format: null } : { ok: true, format: 'YYYY-MM-DD', date: d };
}

function stepMeta() {
  return STEPS[state.currentStep - 1];
}

function setStep(step) {
  state.currentStep = step;
  renderStep();
}

function getSelectedSheetRows(typeKey) {
  const sheetName = state.tabMapping[typeKey];
  if (!sheetName) return [];
  return state.sheetRowsPreview[sheetName] || [];
}

function mappedHeader(typeKey, canonical) {
  return state.columnMapping[`${typeKey}_columns`][canonical] || null;
}

function renderStep() {
  clearError();
  document.getElementById('step-line').textContent = `Step ${state.currentStep} of 5`;
  document.getElementById('step-desc').textContent = stepMeta().title;
  document.getElementById('progress-fill').style.width = `${(state.currentStep / 5) * 100}%`;

  if (state.currentStep === 2) renderTabStep();
  if (state.currentStep === 3) renderColumnStep();

function renderUploadStep() {

async function handleFile(file) {
  const ext = file.name.split('.').pop().toLowerCase();
  if (!['xlsx', 'xlsm'].includes(ext)) {
    showError('Please upload a valid .xlsx or .xlsm file.');
    return;
  }
  clearError();
  const reader = new FileReader();
  reader.onload = (evt) => {
    try {
      const workbook = XLSX.read(evt.target.result, { type: 'array' });
      state.workbook = workbook;
      state.fileName = file.name;
      state.sheetNames = workbook.SheetNames || [];
      state.sheetsWithHeaders = {};
      state.sheetRowsPreview = {};
      for (const sheetName of state.sheetNames) {
        const ws = workbook.Sheets[sheetName];
        const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: true, defval: '' });
        const limitedRows = rows.slice(0, 500);
        // Scan the first 5 rows to find the actual header row.
        // The header row is the first row that has 3 or more non-empty string cells.
        // This handles sheets where row 0 is a title or blank line above the real headers.
        const headerRowIndex = detectHeaderRowIndex(limitedRows);
        const headers = (limitedRows[headerRowIndex] || []).map((h) => (h || '').toString().trim());
        // Preview rows start at the detected header row (row 0 = headers).
        state.sheetRowsPreview[sheetName] = limitedRows.slice(headerRowIndex);
        state.sheetsWithHeaders[sheetName] = headers.filter(Boolean);
        console.log('Sheet:', sheetName, '| Headers found:', headers);
      }
      for (const tab of TAB_TYPES) {
        state.tabMapping[tab.key] = suggestTabMatch(tab.key, state.sheetNames);
      }

      // ── STAR detection: runs before the PMS wizard (does not modify PMS flow) ──
      // Check filename prefix first; fall back to sheet-name heuristic.
      const starType = detectStarFile(state.fileName, state.sheetNames);
      if (starType) {
        state.starDetected   = true;
        state.starReportType = starType;
        state.starHeader     = parseStarHeaderClientSide(workbook);
        state.starFile       = file; // hold File ref so importStarFile() can upload it
        renderStarConfirmationStep();
        return; // skip PMS wizard entirely
      }

      // Not a STAR file — proceed with normal PMS tab-mapping wizard.
      setStep(2);
    } catch {
      showError('We could not read this workbook. Please verify the file is a valid Excel export.');
    }
  };
  reader.readAsArrayBuffer(file);
}

// STAR FILE DETECTION & IMPORT
// These functions form a self-contained layer that runs before the PMS wizard.
// The PMS wizard (renderTabStep and below) is not touched.
// =============================================================================

/**
 * Returns 'weekly' | 'monthly' if the file looks like a CoStar STAR report,
 * or null if it should go through the normal PMS wizard.
 *
 * Detection order (mirrors ingest-star.js detectReportType):
 *   1. Filename prefix  → Weekly_STAR* / Monthly_STAR*
 *   2. Sheet names      → workbook contains ("Comp" OR "Daily by Month") AND
 *                          ("Glance" OR "Response")
 */
function detectStarFile(fileName, sheetNames) {
  const fn = String(fileName || '').trim();

  // Rule 1: filename prefix (case-insensitive)
  if (/^Weekly_STAR/i.test(fn))  return 'weekly';
  if (/^Monthly_STAR/i.test(fn)) return 'monthly';

  // Rule 2: characteristic sheet names — must have at least one "data" sheet
  // AND at least one "summary" sheet that CoStar STAR exports always include.
  const names = (sheetNames || []).map(n => n.toLowerCase());
  const hasDataSheet    = names.some(n => n === 'comp' || /daily.?by.?month/.test(n));
  const hasSummarySheet = names.some(n => n === 'glance' || n === 'response');
  if (hasDataSheet && hasSummarySheet) {
    // Distinguish Weekly (has Glance) vs Monthly (has Comp) by sheet names.
    // If both sheets are present default to monthly (Comp is the stronger signal).
    const hasComp = names.some(n => n === 'comp');
    return hasComp ? 'monthly' : 'weekly';
  }

  return null; // not a STAR file — use PMS wizard
}

/**
 * Lightweight client-side parse of the STAR header block from the first sheet.
 * Extracts propertyName, periodStart, periodEnd (human-readable strings).
 * This is used only for the confirmation screen; the server re-parses on import.
 */
function parseStarHeaderClientSide(workbook) {
  const result = { propertyName: null, periodStart: null, periodEnd: null };
  const firstSheetName = (workbook.SheetNames || [])[0];
  if (!firstSheetName) return result;

  const ws = workbook.Sheets[firstSheetName];
  const rows = XLSX.utils.sheet_to_json(ws, { header: 1, raw: false, defval: '' });

  for (let r = 0; r < Math.min(30, rows.length); r++) {
    const row = rows[r] || [];
    for (let c = 0; c < Math.min(row.length, 8); c++) {
      const label = String(row[c] || '').trim();
      if (!label) continue;

      // Property name: cell starts with "Property" or "Property Name"
      if (/^property(\s+name)?:/i.test(label)) {
        result.propertyName = String(row[c + 1] || row[c + 2] || '').trim() || null;
      }

      // Period line: "For the Week of: ..." or "For the Month of: ..."
      if (/for the (week|month) of:/i.test(label)) {
        // Dates may be spread across adjacent cells — join the whole row after label
        const combined = row.slice(c).map(v => String(v || '').trim()).filter(Boolean).join(' ');
        const stripped = combined.replace(/for the (week|month) of:/i, '').trim();
        // Accept MM/DD/YYYY or "Month DD, YYYY" style dates
        const parts = stripped.match(
          /\d{1,2}\/\d{1,2}\/\d{4}|(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\.?\s+\d{1,2},?\s*\d{4}/gi
        );
        if (parts && parts.length >= 1) {
          result.periodStart = parts[0];
          result.periodEnd   = parts[1] || parts[0];
        }
      }
    }
  }
  return result;
}

/**
 * Uploads the STAR file to Supabase Storage then calls POST /api/ingest-star.
 * On success renders a results summary; on failure shows an inline error.
 */
async function importStarFile() {
  const importBtn = document.getElementById('star-import-btn');
  const backBtn   = document.getElementById('star-back-btn');
  const errEl     = document.getElementById('star-import-error');

  // Disable controls and show progress
  importBtn.disabled = true;
  importBtn.textContent = 'Uploading…';
  backBtn.disabled = true;
  errEl.style.display = 'none';

  try {
    // Step 1: upload file to Supabase Storage (same bucket used by index.html)
    const safeFileName = state.starFile.name.replace(/[^a-zA-Z0-9._-]/g, '_');
    const filePath = `${state.hotelCode}/${Date.now()}_${safeFileName}`;

    const { error: uploadError } = await supabaseClient
      .storage
      .from('hotel-uploads')
      .upload(filePath, state.starFile, { upsert: true });

    if (uploadError) throw new Error(`Storage upload failed: ${uploadError.message}`);

    // Step 2: create a 10-minute signed URL for the server to download
    const { data: signedUrlData, error: signedUrlError } = await supabaseClient
      .storage
      .from('hotel-uploads')
      .createSignedUrl(filePath, 60 * 10);

    if (signedUrlError) throw new Error(`Signed URL failed: ${signedUrlError.message}`);

    importBtn.textContent = 'Processing…';

    // Step 3: call the STAR ingest endpoint (mirrors ingest-star.js handler signature)
    const response = await fetch('https://aithenor-api-production.up.railway.app/api/ingest-star', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        hotelCode: state.hotelCode,
        fileUrl:   signedUrlData.signedUrl,
        fileName:  state.starFile.name,
      }),
    });

    const result = await response.json();
    if (!response.ok) throw new Error(result.error || 'Import failed');

    // Step 4: show results summary
    renderStarImportResults(result);

  } catch (err) {
    // Show inline error without wiping the confirmation screen
    errEl.textContent = `Import failed: ${err.message}`;
    errEl.style.display = 'block';
    importBtn.disabled = false;
    importBtn.textContent = 'Retry Import';
    backBtn.disabled = false;
  }
}

function renderTabStep() {
  const body = document.getElementById('step-body');
  const options = (selected) => `
    <option value="">Not in my file</option>
    ${state.sheetNames.map((name) => `<option ${selected === name ? 'selected' : ''} value="${escapeHtml(name)}">${escapeHtml(name)}</option>`).join('')}
  `;
  body.innerHTML = `
    <div class="section-title">Identify each data tab</div>
    <p class="hint">We pre-selected likely matches. Confirm or adjust before continuing.</p>
    ${TAB_TYPES.map((t) => `
      <div class="field-row">
        <div><strong>${t.label}</strong></div>
        <div><select data-tab-key="${t.key}">${options(state.tabMapping[t.key])}</select></div>
      </div>
    `).join('')}
    <div class="actions">
      <div></div>
      <div class="right">
        <button class="btn btn-primary" id="next-step2">Continue</button>
      </div>
    </div>
  `;
  body.querySelectorAll('select[data-tab-key]').forEach((el) => {
    el.addEventListener('change', (e) => {
      state.tabMapping[e.target.dataset.tabKey] = e.target.value || null;
    });
  });
  document.getElementById('next-step2').addEventListener('click', () => {
    autoPopulateColumnMappings();
    setStep(3);
  });
}

function autoPopulateColumnMappings() {
  for (const tab of TAB_TYPES) {
    const key = tab.key;
    const selectedSheet = state.tabMapping[key];
    const targetMapping = {};
    const targetMeta = {};
    if (!selectedSheet) {
      state.columnMapping[`${key}_columns`] = {};
      state.autoMeta[key] = {};
      continue;
    }
    const headers = state.sheetsWithHeaders[selectedSheet] || [];
    for (const [canonical] of CANONICAL_FIELDS[key]) {
      const aliases = ALIASES[key][canonical] || [canonical];
      const best = bestHeaderMatch(headers, aliases);
      if (best.header && best.score >= 0.86) {
        targetMapping[canonical] = best.header;
      } else {
        targetMapping[canonical] = '';
      }
      targetMeta[canonical] = { score: best.score };
    }
    state.columnMapping[`${key}_columns`] = targetMapping;
    state.autoMeta[key] = targetMeta;
  }
}

function autoBadge() {
  return `<span class="pill">
    <svg class="check-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M20 6L9 17L4 12" stroke="#6B6B67" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Auto-matched
  </span>`;
}

function getFirstDataValue(typeKey, headerName) {
  if (!headerName) return null;
  const rows = getSelectedSheetRows(typeKey);
  if (rows.length < 2) return null;
  const headers = rows[0] || [];
  const idx = headers.findIndex((h) => h === headerName);
  if (idx < 0) return null;
  // Find the first non-empty value from data rows
  for (let i = 1; i < Math.min(rows.length, 6); i++) {
    const val = rows[i]?.[idx];
    if (val !== null && val !== undefined && val.toString().trim() !== '') {
      return val.toString().trim();
    }
  }
  return null;
}

function renderColumnStep() {
  const body = document.getElementById('step-body');
  const blocks = [];
  for (const tab of TAB_TYPES) {
    const key = tab.key;
    const sheetName = state.tabMapping[key];
    if (!sheetName) continue;
    const headers = state.sheetsWithHeaders[sheetName] || [];
    const rows = [];
    const autoRows = [];
    for (const [canonical, label] of CANONICAL_FIELDS[key]) {
      const mapped = state.columnMapping[`${key}_columns`][canonical] || '';
      const score = state.autoMeta[key]?.[canonical]?.score || 0;
      const highConfidence = mapped && score >= 0.86;
      const html = `
        <div class="field-row ${highConfidence ? 'auto-row' : 'warn-row'}">
          <div>
            <strong>${escapeHtml(canonical)}</strong>
            <small>${escapeHtml(label)}</small>
            ${highConfidence ? autoBadge() : '<small style="color:#8d6506;">Needs review</small>'}
          </div>
          <div>
            <select data-type="${key}" data-canonical="${canonical}" data-sheet="${key}">
              <option value="">Not in my file</option>
              ${headers.map((h) => `<option ${mapped === h ? 'selected' : ''} value="${escapeHtml(h)}">${escapeHtml(h)}</option>`).join('')}
            </select>
            <small id="preview-${key}-${canonical}" style="color:var(--gray-600); margin-top:3px; display:block; font-style:italic;">
              ${mapped ? (() => { const v = getFirstDataValue(key, mapped); return v ? `First value: ${escapeHtml(v)}` : ''; })() : ''}
            </small>
          </div>
        </div>
      `;
      if (highConfidence) autoRows.push(html);
      else rows.push(html);
    }
    blocks.push(`
      <div class="section-title">${tab.label} <span class="subtle">(${escapeHtml(sheetName)})</span></div>
      <p class="hint">Match Aithenor fields to this tab's actual headers.</p>
      ${rows.join('') || '<div class="hint">No uncertain rows found.</div>'}
      ${autoRows.length ? `<button class="toggle-link" data-toggle-auto="${key}">${state.showAuto[key] ? 'Hide' : 'Review'} auto-matched fields (${autoRows.length})</button>` : ''}
      <div class="${state.showAuto[key] ? '' : 'hidden'}" id="auto-${key}">${autoRows.join('')}</div>
    `);
  }
  body.innerHTML = `
    ${blocks.join('') || '<div class="hint">No tabs selected in Step 2.</div>'}
    <div class="actions">
      <button class="btn btn-secondary" id="back-step3">Back</button>
      <div class="right"><button class="btn btn-primary" id="next-step3">Continue</button></div>
    </div>
  `;

  body.querySelectorAll('select[data-type]').forEach((el) => {
    el.addEventListener('change', (e) => {
      const type = e.target.dataset.type;
      const canonical = e.target.dataset.canonical;
      const selectedHeader = e.target.value || '';
      state.columnMapping[`${type}_columns`][canonical] = selectedHeader;
      // Update the preview line live
      const previewEl = document.getElementById(`preview-${type}-${canonical}`);
      if (previewEl) {
        if (selectedHeader) {
          const v = getFirstDataValue(type, selectedHeader);
          previewEl.textContent = v ? `First value: ${v}` : '';
        } else {
          previewEl.textContent = '';
        }
      }
    });
  });
  body.querySelectorAll('button[data-toggle-auto]').forEach((el) => {
    el.addEventListener('click', (e) => {
      const key = e.target.dataset.toggleAuto;
      state.showAuto[key] = !state.showAuto[key];
      renderColumnStep();
    });
  });
  document.getElementById('back-step3').addEventListener('click', () => setStep(2));
  document.getElementById('next-step3').addEventListener('click', () => {
    prepareSegmentRows();
    if (!state.tabMapping.pms || state.segmentStepSkipped || !Object.keys(state.segmentMapping).length) {
      setStep(5);
      runValidation();
      return;
    }
    setStep(4);
  });
}

function prepareSegmentRows() {
  state.segmentMapping = {};
  state.segmentStepSkipped = false;
  state.uncertainSegmentRowCount = 0;
  const pmsSheet = state.tabMapping.pms;
  if (!pmsSheet) return;
  const segmentHeader = mappedHeader('pms', 'segment_code');
  if (!segmentHeader) return;
  const nameHeader = mappedHeader('pms', 'segment_name');
  const rows = getSelectedSheetRows('pms');
  const headers = rows[0] || [];
  const codeIdx = headers.findIndex((h) => h === segmentHeader);
  if (codeIdx < 0) return;
  const nameIdx = nameHeader ? headers.findIndex((h) => h === nameHeader) : -1;

  const codeMeta = new Map();
  for (const row of rows.slice(1)) {
    const code = (row[codeIdx] || '').toString().trim();
    if (!code) continue;
    if (!codeMeta.has(code)) {
      const sampleName = nameIdx >= 0 ? (row[nameIdx] || '').toString().trim() : '';
      codeMeta.set(code, { sample_name: sampleName, row_count: 0 });
    }
    codeMeta.get(code).row_count += 1;
  }
  console.log('[prepareSegmentRows] rows processed:', rows.slice(1).length, '| unique segment codes:', Array.from(codeMeta.keys()).sort());

  let needsReview = false;
  for (const code of Array.from(codeMeta.keys()).sort()) {
    const meta = codeMeta.get(code);
    let aithenorSegment = '';
    let status = 'uncertain';

    const saved = readSavedAithenorSegment(state.savedSegmentMapping[code]);
    if (saved) {
      aithenorSegment = saved;
      status = 'confirmed';
    } else if (AITHENOR_SEGMENT_LOOKUP.has(code.toLowerCase())) {
      // Files already carrying final Aithenor labels (e.g. AUREM-PAR) auto-confirm silently.
      aithenorSegment = AITHENOR_SEGMENT_LOOKUP.get(code.toLowerCase());
      status = 'native';
    } else {
      const global = readSavedAithenorSegment(state.globalSegmentMapping[code]);
      if (global) {
        aithenorSegment = global;
        status = 'seen_before';
        needsReview = true;
      } else {
        const auto = autoSuggestAithenorSegment(code);
        if (auto) {
          aithenorSegment = auto;
          status = 'auto';
        } else {
          needsReview = true;
        }
      }
    }

    if (status === 'uncertain') {
      state.uncertainSegmentRowCount += meta.row_count;
    }

    state.segmentMapping[code] = {
      aithenor_segment: aithenorSegment,
      status,
      sample_name: meta.sample_name,
      row_count: meta.row_count
    };
  }

  const allSilent = Object.values(state.segmentMapping).every(
    (v) => v.status === 'confirmed' || v.status === 'native' || v.status === 'auto'
  );
  if (!needsReview && allSilent && Object.keys(state.segmentMapping).length > 0) {
    state.segmentStepSkipped = true;
  }
}

function segmentStatusBadge(status) {
  if (status === 'auto') return autoBadge();
  if (status === 'seen_before') return seenBeforeBadge();
  if (status === 'native' || status === 'confirmed') return autoBadge().replace('Auto-matched', 'Confirmed');
  return '<small style="color:#8d6506;">Needs review</small>';
}

function renderSegmentStep() {
  const body = document.getElementById('step-body');
  const entries = Object.entries(state.segmentMapping);
  const reviewRows = [];
  const autoRows = [];

  for (const [code, v] of entries) {
    const isAutoLike = v.status === 'auto' || v.status === 'native' || v.status === 'confirmed';
    const html = `
      <div class="field-row ${v.status === 'uncertain' ? 'warn-row' : (isAutoLike ? 'auto-row' : '')}">
        <div>
          <strong>${escapeHtml(code)}</strong>
          <small>${v.sample_name ? escapeHtml(v.sample_name) : 'No segment name column mapped'}</small>
          ${segmentStatusBadge(v.status)}
        </div>
        <div>
          <select data-code="${escapeHtml(code)}">
            <option value="">Select Aithenor segment</option>
            ${AITHENOR_SEGMENTS.map((label) =>
              `<option value="${escapeHtml(label)}" ${v.aithenor_segment === label ? 'selected' : ''}>${escapeHtml(label)}</option>`
            ).join('')}
          </select>
        </div>
      </div>
    `;
    if (isAutoLike) autoRows.push(html);
    else reviewRows.push(html);
  }

  body.innerHTML = `
    <div class="section-title">Map segment codes to Aithenor segments</div>
    <p class="hint">Each distinct value in your segment_code column is mapped to an Aithenor commercial segment. Uncertain codes must be confirmed before those rows can be imported.</p>
    ${reviewRows.join('') || '<div class="hint">No uncertain segment codes.</div>'}
    ${autoRows.length ? `<button class="toggle-link" id="toggle-auto-segments">${state.showAutoSegments ? 'Hide' : 'Review'} auto-matched codes (${autoRows.length})</button>` : ''}
    <div class="${state.showAutoSegments ? '' : 'hidden'}" id="auto-segments">${autoRows.join('')}</div>
    <div class="actions">
      <button class="btn btn-secondary" id="back-step4">Back</button>
      <div class="right"><button class="btn btn-primary" id="next-step4">Continue</button></div>
    </div>
  `;

  const toggle = document.getElementById('toggle-auto-segments');
  if (toggle) {
    toggle.addEventListener('click', () => {
      state.showAutoSegments = !state.showAutoSegments;
      renderSegmentStep();
    });
  }

  body.querySelectorAll('select[data-code]').forEach((el) => {
    el.addEventListener('change', (e) => {
      const code = e.target.dataset.code;
      const selected = e.target.value || '';
      state.segmentMapping[code].aithenor_segment = selected;
      state.segmentMapping[code].status = selected ? 'confirmed' : 'uncertain';
      recalcUncertainSegmentRows();
    });
  });
  document.getElementById('back-step4').addEventListener('click', () => setStep(3));
  document.getElementById('next-step4').addEventListener('click', () => {
    setStep(5);
    runValidation();
  });
}

function recalcUncertainSegmentRows() {
  state.uncertainSegmentRowCount = Object.values(state.segmentMapping)
    .filter((v) => v.status === 'uncertain' || !v.aithenor_segment)
    .reduce((sum, v) => sum + (v.row_count || 0), 0);
}

function validateField(name, ok, warnText) {
  return { name, ok, text: ok ? `${name} looks valid.` : warnText };
}

function average(arr) {
  if (!arr.length) return 0;
  return arr.reduce((a, b) => a + b, 0) / arr.length;
}

function runValidation() {
  state.validationResults = [];
  state.detectedDateFormat = '';
  const pmsSheet = state.tabMapping.pms;
  if (!pmsSheet) {
    state.validationResults.push({ name: 'PMS validation', ok: true, text: 'No PMS tab selected. Mapping can still be saved.' });
    renderValidationStep();
    return;
  }
  const rows = getSelectedSheetRows('pms');
  if (rows.length < 2) {
    state.validationResults.push({ name: 'PMS sample data', ok: false, text: 'No PMS sample rows were found for validation in the first 500 rows.' });
    renderValidationStep();
    return;
  }

  const headers = rows[0];
  const sample = rows.slice(1, 11);
  const getValues = (canonical) => {
    const header = mappedHeader('pms', canonical);
    if (!header) return [];
    const idx = headers.findIndex((h) => h === header);
    if (idx < 0) return [];
    return sample.map((r) => r[idx]).filter((v) => v !== '' && v !== null && v !== undefined);
  };

  const dateVals = getValues('date');
  const dateParsed = dateVals.map(parseDateValue);
  const validDateCount = dateParsed.filter((d) => d.ok).length;
  const dateFormats = dateParsed.filter((d) => d.ok && d.format).map((d) => d.format);
  const formatFreq = {};
  for (const fmt of dateFormats) formatFreq[fmt] = (formatFreq[fmt] || 0) + 1;
  state.detectedDateFormat = Object.entries(formatFreq).sort((a, b) => b[1] - a[1])[0]?.[0] || '';
  state.validationResults.push(validateField(
    'Date field',
    validDateCount === dateVals.length && dateVals.length > 0,
    'Some date values could not be parsed. Please verify your date column mapping.'
  ));

  const rnTy = getValues('rn_ty').map(parseNumber);
  const rnLy = getValues('rn_ly').map(parseNumber);
  const rnOk = [...rnTy, ...rnLy].every((n) => n !== null && n >= 0 && Number.isFinite(n));
  state.validationResults.push(validateField(
    'Room nights fields',
    rnOk && (rnTy.length + rnLy.length > 0),
    'Room nights include non-numeric values. Please confirm rn_ty and rn_ly mappings.'
  ));

  const revTy = getValues('rev_ty').map(parseNumber);
  const revLy = getValues('rev_ly').map(parseNumber);
  const revOk = [...revTy, ...revLy].every((n) => n !== null && n >= 0);
  state.validationResults.push(validateField(
    'Revenue fields',
    revOk && (revTy.length + revLy.length > 0),
    'Revenue values include non-numeric entries. Please confirm rev_ty and rev_ly mappings.'
  ));

  const adrTy = getValues('adr_ty').map(parseNumber).filter((n) => n !== null);
  const adrLy = getValues('adr_ly').map(parseNumber).filter((n) => n !== null);
  const adrVals = [...adrTy, ...adrLy];
  const adrWithin = adrVals.every((v) => v >= 10 && v <= 10000);
  const avgAdr = average(adrVals);
  state.validationResults.push(validateField(
    'ADR fields',
    adrVals.length > 0 && adrWithin,
    `ADR values appear unusual — average is €${Math.round(avgAdr || 0)}. Please confirm ADR and revenue mappings.`
  ));

  recalcUncertainSegmentRows();
  const uncertainCodes = Object.entries(state.segmentMapping)
    .filter(([, v]) => v.status === 'uncertain' || !v.aithenor_segment)
    .map(([code]) => code);
  if (uncertainCodes.length) {
    state.validationResults.push({
      name: 'Segment value mapping',
      ok: false,
      text: `${uncertainCodes.length} segment code(s) unmapped (${state.uncertainSegmentRowCount} rows will be skipped on import): ${uncertainCodes.join(', ')}.`
    });
  } else if (Object.keys(state.segmentMapping).length) {
    state.validationResults.push({
      name: 'Segment value mapping',
      ok: true,
      text: `All ${Object.keys(state.segmentMapping).length} segment codes are mapped.`
    });
  }

  renderValidationStep();
}

function renderValidationStep() {
  const body = document.getElementById('step-body');
  const warnings = state.validationResults.filter((r) => !r.ok);
  body.innerHTML = `
    <div class="section-title">Validation results</div>
    <p class="hint">Checks are based on the first 10 PMS data rows using your selected mappings.</p>
    ${state.validationResults.map((r) => `
      <div class="${r.ok ? 'status-ok' : 'status-warn'}">
        <span class="dot">${r.ok ? '✓' : '!'}</span>
        <div><strong>${escapeHtml(r.name)}:</strong> ${escapeHtml(r.text)}</div>
      </div>
    `).join('')}
    <div class="actions">
      <button class="btn btn-secondary" id="back-step5">${state.tabMapping.pms ? 'Back' : 'Back to column mapping'}</button>
      <div class="right">
        ${warnings.length ? '<button class="btn btn-ghost" id="save-anyway">Save anyway</button>' : ''}
        <button class="btn btn-primary" id="save-confirm">Confirm and save</button>
      </div>
    </div>
  `;
  document.getElementById('back-step5').addEventListener('click', () => setStep(state.tabMapping.pms ? 4 : 3));
  if (document.getElementById('save-anyway')) {
    document.getElementById('save-anyway').addEventListener('click', () => saveMapping());
  }
  document.getElementById('save-confirm').addEventListener('click', () => saveMapping());
}

function buildPayload() {
  const segmentMapping = {};
  for (const [code, v] of Object.entries(state.segmentMapping)) {
    if (!v.aithenor_segment) continue;
    // Persist confirmed value mappings per property in existing segment_mapping JSON.
    segmentMapping[code] = {
      aithenor_segment: v.aithenor_segment,
      status: v.status === 'uncertain' ? 'uncertain' : 'confirmed'
    };
  }
  const excludeSegments = Object.entries(state.segmentMapping)
    .filter(([, v]) => v.aithenor_segment === 'Non-revenue')
    .map(([code]) => code);
  return {
    hotel_code: state.hotelCode,
    tab_mapping: state.tabMapping,
    column_mapping: state.columnMapping,
    segment_mapping: segmentMapping,
    exclude_segments: excludeSegments,
    date_format: state.detectedDateFormat || null,
    updated_at: new Date().toISOString()
  };
}

async function saveMapping() {
  clearError();
  const payload = buildPayload();
  if (!payload.hotel_code) {
    showError('Hotel code is missing from your authenticated session.');
    return;
  }
  const { error } = await supabaseClient
    .from('hotel_mappings')
    .update({
      segment_mapping: payload.segment_mapping,
      exclude_segments: payload.exclude_segments,
      updated_at: payload.updated_at
    })
    .eq('hotel_code', payload.hotel_code);
  if (error) {
    showError('Could not save mapping: ' + (error.message || JSON.stringify(error)));
    return;
  }
  renderSuccess();
}

function renderSuccess() {
  const body = document.getElementById('step-body');
  document.getElementById('step-line').textContent = 'Configuration complete';
  document.getElementById('step-desc').textContent = 'Mapping saved';
  document.getElementById('progress-fill').style.width = '100%';
  body.innerHTML = `
    <div class="success-box">
      <div class="success-title">Your data mapping is saved.</div>
      <p class="subtle">Future uploads will be processed automatically.</p>
      <div style="margin-top:16px;">
        <button class="btn btn-primary" id="return-dashboard">Return to dashboard</button>
      </div>
    </div>
  `;
  document.getElementById('return-dashboard').addEventListener('click', () => {
    window.location.href = './index.html';
  });
}

function escapeHtml(value) {
  return (value || '').toString()
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

async function loadPersistedSegmentMappings() {
  state.savedSegmentMapping = {};
  state.globalSegmentMapping = {};
  if (!state.hotelCode) return;
  const { data, error } = await supabaseClient
    .from('hotel_mappings')
    .select('hotel_code, segment_mapping');
  if (error || !Array.isArray(data)) return;
  for (const row of data) {
    const mapping = row.segment_mapping || {};
    for (const [code, entry] of Object.entries(mapping)) {
      const segment = readSavedAithenorSegment(entry);
      if (!segment) continue;
      if (row.hotel_code === state.hotelCode) {
        state.savedSegmentMapping[code] = { aithenor_segment: segment };
      } else if (!state.globalSegmentMapping[code]) {
        state.globalSegmentMapping[code] = { aithenor_segment: segment };
      }
    }
  }
}

async function boot() {
  const { data: { session } } = await supabaseClient.auth.getSession();
  if (!session) {
    window.location.href = './index.html';
    return;
  }
  state.hotelCode = getJwtClaimHotelCode(session);
  if (!state.hotelCode) {
    showError('No hotel_code claim found in your session. Please contact your administrator.');
  }
  await loadPersistedSegmentMappings();
  renderStep();
}

boot();
</script>
